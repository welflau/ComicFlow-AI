<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .form-container {
            padding: 40px;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-switch {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .form-switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .form-switch a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .dashboard {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .dashboard.active {
            display: block;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #666;
            margin: 5px 0;
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }

        .btn-danger {
            background: #dc3545;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录表单 -->
        <div id="loginForm" class="form-container">
            <h2 class="form-title">Login</h2>
            <div id="loginAlert"></div>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="loading hidden"></span>
                </button>
            </form>
            <div class="form-switch">
                Don't have an account? <a href="#" id="showRegister">Register here</a>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="form-container hidden">
            <h2 class="form-title">Register</h2>
            <div id="registerAlert"></div>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" name="password" required>
                </div>
                <div class="form-group">
                    <label for="registerRole">Role</label>
                    <select id="registerRole" name="role">
                        <option value="user">User</option>
                        <option value="moderator">Moderator</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="registerBtn">
                    <span class="btn-text">Register</span>
                    <span class="loading hidden"></span>
                </button>
            </form>
            <div class="form-switch">
                Already have an account? <a href="#" id="showLogin">Login here</a>
            </div>
        </div>

        <!-- 用户仪表板 -->
        <div id="dashboard" class="dashboard">
            <h2 class="form-title">Dashboard</h2>
            <div id="dashboardAlert"></div>
            <div class="user-info" id="userInfo">
                <!-- 用户信息将在这里显示 -->
            </div>
            <button class="btn btn-secondary" id="refreshTokenBtn">Refresh Token</button>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
            <button class="btn btn-danger" id="logoutAllBtn">Logout All Devices</button>
        </div>
    </div>

    <script>
        class AuthApp {
            constructor() {
                this.baseURL = '/api';
                this.tokens = this.getStoredTokens();
                this.init();
            }

            init() {
                this.bindEvents();
                this.checkAuthStatus();
            }

            bindEvents() {
                // 表单切换
                document.getElementById('showRegister').addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showRegisterForm();
                });

                document.getElementById('showLogin').addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showLoginForm();
                });

                // 表单提交
                document.getElementById('loginFormElement').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                document.getElementById('registerFormElement').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleRegister();
                });

                // 仪表板按钮
                document.getElementById('refreshTokenBtn').addEventListener('click', () => {
                    this.handleRefreshToken();
                });

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    this.handleLogout();
                });

                document.getElementById('logoutAllBtn').addEventListener('click', () => {
                    this.handleLogoutAll();
                });
            }

            showLoginForm() {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('active');
                this.clearAlerts();
            }

            showRegisterForm() {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
                document.getElementById('dashboard').classList.remove('active');
                this.clearAlerts();
            }

            showDashboard() {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                this.loadUserProfile();
            }

            async handleLogin() {
                const form = document.getElementById('loginFormElement');
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                this.setLoading('loginBtn', true);
                this.clearAlert('loginAlert');

                try {
                    const response = await fetch(`${this.baseURL}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.tokens = result.data.tokens;
                        this.storeTokens(this.tokens);
                        this.showAlert('loginAlert', 'Login successful!', 'success');
                        setTimeout(() => this.showDashboard(), 1000);
                    } else {
                        this.showAlert('loginAlert', result.message, 'error');
                    }
                } catch (error) {
                    this.showAlert('loginAlert', 'Login failed. Please try again.', 'error');
                } finally {
                    this.setLoading('loginBtn', false);
                }
            }

            async handleRegister() {
                const form = document.getElementById('registerFormElement');
                const formData = new FormData(form);
                const data = Object.fromEntries(formData);

                this.setLoading('registerBtn', true);
                this.clearAlert('registerAlert');

                try {
                    const response = await fetch(`${this.baseURL}/auth/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.tokens = result.data.tokens;
                        this.storeTokens(this.tokens);
                        this.showAlert('registerAlert', 'Registration successful!', 'success');
                        setTimeout(() => this.showDashboard(), 1000);
                    } else {
                        let errorMessage = result.message;
                        if (result.errors && result.errors.length > 0) {
                            errorMessage += ': ' + result.errors.map(e => e.msg).join(', ');
                        }
                        this.showAlert('registerAlert', errorMessage, 'error');
                    }
                } catch (error) {
                    this.showAlert('registerAlert', 'Registration failed. Please try again.', 'error');
                } finally {
                    this.setLoading('registerBtn', false);
                }
            }

            async handleRefreshToken() {
                if (!this.tokens || !this.tokens.refreshToken) {
                    this.showAlert('dashboardAlert', 'No refresh token available', 'error');
                    return;
                }

                try {
                    const response = await fetch(`${this.baseURL}/auth/refresh`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ refreshToken: this.tokens.refreshToken })
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.tokens = result.data.tokens;
                        this.storeTokens(this.tokens);
                        this.showAlert('dashboardAlert', 'Token refreshed successfully!', 'success');
                    } else {
                        this.showAlert('dashboardAlert', result.message, 'error');
                        this.handleLogout();
                    }
                } catch (error) {
                    this.showAlert('dashboardAlert', 'Token refresh failed', 'error');
                    this.handleLogout();
                }
            }

            async handleLogout() {
                try {
                    if (this.tokens && this.tokens.refreshToken) {
                        await fetch(`${this.baseURL}/auth/logout`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.tokens.accessToken}`
                            },
                            body: JSON.stringify({ refreshToken: this.tokens.refreshToken })
                        });
                    }
                } catch (error) {
                    console.error('Logout error:', error);
                } finally {
                    this.clearTokens();
                    this.showLoginForm();
                }
            }

            async handleLogoutAll() {
                try {
                    const response = await fetch(`${this.baseURL}/auth/logout-all`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${this.tokens.accessToken}`
                        }
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        this.showAlert('dashboardAlert', 'Logged out from all devices', 'success');
                        setTimeout(() => {
                            this.clearTokens();
                            this.showLoginForm();
                        }, 1000);
                    } else {
                        this.showAlert('dashboardAlert', result.message, 'error');
                    }
                } catch (error) {
                    this.showAlert('dashboardAlert', 'Logout all failed', 'error');
                }
            }

            async loadUserProfile() {
                if (!this.tokens || !this.tokens.accessToken) {
                    this.showLoginForm();
                    return;
                }

                try {
                    const response = await fetch(`${this.baseURL}/profile`, {
                        headers: {
                            'Authorization': `Bearer ${this.tokens.accessToken}`
                        }
                    });

                    const result = await response.json();

                    if (result.success) {
                        this.displayUserInfo(result.user);
                    } else {
                        this.showAlert('dashboardAlert', 'Failed to load profile', 'error');
                        this.handleLogout();
                    }
                } catch (error) {
                    this.showAlert('dashboardAlert', 'Failed to load profile', 'error');
                    this.handleLogout();
                }
            }

            displayUserInfo(user) {
                const userInfoDiv = document.getElementById('userInfo');
                userInfoDiv.innerHTML = `
                    <h3>Welcome, ${user.username}!</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Role:</strong> ${user.role}</p>
                    <p><strong>Status:</strong> ${user.isActive ? 'Active' : 'Inactive'}</p>
                    <p><strong>Member since:</strong> ${new Date(user.createdAt).toLocaleDateString()}</p>
                `;
            }

            checkAuthStatus() {
                if (this.tokens && this.tokens.accessToken) {
                    // 检查token是否过期
                    try {
                        const payload = JSON.parse(atob(this.tokens.accessToken.split('.')[1]));
                        const now = Date.now() / 1000;
                        
                        if (payload.exp > now) {
                            this.showDashboard();
                            return;
                        }
                    } catch (error) {
                        console.error('Token parsing error:', error);
                    }
                }
                
                this.showLoginForm();
            }

            showAlert(containerId, message, type) {
                const container = document.getElementById(containerId);
                container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            }

            clearAlert(containerId) {
                document.getElementById(containerId).innerHTML = '';
            }

            clearAlerts() {
                this.clearAlert('loginAlert');
                this.clearAlert('registerAlert');
                this.clearAlert('dashboardAlert');
            }

            setLoading(buttonId, loading) {
                const button = document.getElementById(buttonId);
                const text = button.querySelector('.btn-text');
                const spinner = button.querySelector('.loading');
                
                if (loading) {
                    button.disabled = true;
                    text.classList.add('hidden');
                    spinner.classList.remove('hidden');
                } else {
                    button.disabled = false;
                    text.classList.remove('hidden');
                    spinner.classList.add('hidden');
                }
            }

            storeTokens(tokens) {
                localStorage.setItem('authTokens', JSON.stringify(tokens));
            }

            getStoredTokens() {
                const stored = localStorage.getItem('authTokens');
                return stored ? JSON.parse(stored) : null;
            }

            clearTokens() {
                localStorage.removeItem('authTokens');
                this.tokens = null;
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            new AuthApp();
        });
    </script>
</body>
</html>
