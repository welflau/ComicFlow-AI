<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目模板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .feature {
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .feature h3 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .feature p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .actions {
            margin-top: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 0 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            color: #155724;
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .btn {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">P</div>
        <h1>项目模板</h1>
        <p class="subtitle">现代化的 Web 项目开发模板，快速启动您的项目</p>
        
        <div class="features">
            <div class="feature">
                <h3>🚀 快速启动</h3>
                <p>预配置的项目结构，开箱即用的开发环境</p>
            </div>
            <div class="feature">
                <h3>📱 响应式设计</h3>
                <p>适配各种设备屏幕，提供最佳用户体验</p>
            </div>
            <div class="feature">
                <h3>🛠️ 现代工具</h3>
                <p>集成最新的开发工具和最佳实践</p>
            </div>
        </div>

        <div class="actions">
            <button class="btn" onclick="startProject()">开始项目</button>
            <button class="btn btn-secondary" onclick="viewDocs()">查看文档</button>
        </div>

        <div class="status" id="status" style="display: none;">
            <strong>项目状态：</strong> <span id="statusText">就绪</span>
        </div>

        <div class="footer">
            <p>&copy; 2024 项目模板. 基于 MIT 许可证开源</p>
            <p>版本: 1.0.0 | 最后更新: <span id="lastUpdate"></span></p>
        </div>
    </div>

    <script>
        // 项目初始化脚本
        class ProjectTemplate {
            constructor() {
                this.version = '1.0.0';
                this.initialized = false;
                this.init();
            }

            init() {
                console.log('项目模板初始化中...');
                this.updateLastUpdateTime();
                this.checkEnvironment();
                this.initialized = true;
                console.log('项目模板初始化完成');
            }

            updateLastUpdateTime() {
                const now = new Date();
                const timeString = now.toLocaleString('zh-CN');
                document.getElementById('lastUpdate').textContent = timeString;
            }

            checkEnvironment() {
                const features = {
                    'ES6+': () => {
                        try {
                            eval('const test = () => {};');
                            return true;
                        } catch (e) {
                            return false;
                        }
                    },
                    'LocalStorage': () => {
                        try {
                            localStorage.setItem('test', 'test');
                            localStorage.removeItem('test');
                            return true;
                        } catch (e) {
                            return false;
                        }
                    },
                    'Fetch API': () => {
                        return typeof fetch !== 'undefined';
                    }
                };

                const results = {};
                for (const [feature, test] of Object.entries(features)) {
                    results[feature] = test();
                }

                console.log('环境检查结果:', results);
                return results;
            }

            showStatus(message, type = 'info') {
                const statusEl = document.getElementById('status');
                const statusTextEl = document.getElementById('statusText');
                
                statusTextEl.textContent = message;
                statusEl.style.display = 'block';
                
                // 根据类型设置样式
                statusEl.className = `status status-${type}`;
                
                // 3秒后隐藏
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }

            async simulateProjectStart() {
                this.showStatus('正在初始化项目...', 'info');
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                this.showStatus('配置开发环境...', 'info');
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                this.showStatus('安装依赖包...', 'info');
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                this.showStatus('项目启动成功！', 'success');
            }
        }

        // 全局函数
        function startProject() {
            console.log('启动项目...');
            window.projectTemplate.simulateProjectStart();
        }

        function viewDocs() {
            console.log('查看文档...');
            window.projectTemplate.showStatus('文档功能开发中...', 'info');
            // 实际项目中可以跳转到文档页面
            // window.open('./docs/API.md', '_blank');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            window.projectTemplate = new ProjectTemplate();
        });

        // 添加一些实用的工具函数
        const utils = {
            // 格式化日期
            formatDate: (date) => {
                return new Date(date).toLocaleDateString('zh-CN');
            },
            
            // 防抖函数
            debounce: (func, wait) => {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            },
            
            // 节流函数
            throttle: (func, limit) => {
                let inThrottle;
                return function() {
                    const args = arguments;
                    const context = this;
                    if (!inThrottle) {
                        func.apply(context, args);
                        inThrottle = true;
                        setTimeout(() => inThrottle = false, limit);
                    }
                }
            },
            
            // 生成UUID
            generateUUID: () => {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c == 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
        };

        // 将工具函数挂载到全局
        window.utils = utils;

        // 添加键盘快捷键支持
        document.addEventListener('keydown', (e) => {
            // Ctrl + Enter 启动项目
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                startProject();
            }
            
            // Ctrl + D 查看文档
            if (e.ctrlKey && e.key === 'd') {
                e.preventDefault();
                viewDocs();
            }
        });

        console.log('项目模板加载完成 🎉');
        console.log('快捷键提示:');
        console.log('- Ctrl + Enter: 启动项目');
        console.log('- Ctrl + D: 查看文档');
    </script>
</body>
</html>
