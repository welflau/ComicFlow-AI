name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
    
    - name: Run type checking
      run: npm run type-check
    
    - name: Run tests with coverage
      run: npm run test:coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
    
    - name: Build application
      run: npm run build
    
    - name: Run E2E tests
      run: npm run test:e2e
    
    - name: Check bundle size
      run: npm run analyze:bundle
    
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read test results
          const testResults = fs.readFileSync('test-results.json', 'utf8');
          const results = JSON.parse(testResults);
          
          // Read bundle analysis
          const bundleAnalysis = fs.readFileSync('bundle-analysis.json', 'utf8');
          const bundle = JSON.parse(bundleAnalysis);
          
          const comment = `## 🔍 PR Check Results
          
          ### ✅ Tests
          - **Passed**: ${results.passed}
          - **Failed**: ${results.failed}
          - **Coverage**: ${results.coverage}%
          
          ### 📦 Bundle Analysis
          - **Size**: ${bundle.size}
          - **Gzipped**: ${bundle.gzipped}
          
          ### 🚀 Build Status
          Build completed successfully! Ready for review.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });