<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js无限画布系统</title>
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            overflow: hidden;
            user-select: none;
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        .canvas-container.dragging {
            cursor: grabbing;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .performance-stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 2000;
        }

        .grid-info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="canvas-container" id="canvasContainer">
        <div class="loading" id="loading">初始化画布...</div>
        
        <div class="ui-overlay" id="uiOverlay">
            <div><strong>Three.js 无限画布</strong></div>
            <div>缩放: <span id="zoomLevel">1.0</span>x</div>
            <div>位置: (<span id="posX">0</span>, <span id="posY">0</span>)</div>
            <div>对象数量: <span id="objectCount">0</span></div>
        </div>

        <div class="controls">
            <button class="control-btn" id="resetView">重置视图</button>
            <button class="control-btn" id="addObjects">添加对象</button>
            <button class="control-btn" id="toggleGrid">切换网格</button>
            <button class="control-btn" id="togglePerf">性能监控</button>
        </div>

        <div class="performance-stats" id="perfStats" style="display: none;">
            <div>FPS: <span id="fps">0</span></div>
            <div>渲染时间: <span id="renderTime">0</span>ms</div>
            <div>可见对象: <span id="visibleObjects">0</span></div>
            <div>内存使用: <span id="memoryUsage">0</span>MB</div>
        </div>

        <div class="grid-info" id="gridInfo">
            <div>网格单位: <span id="gridUnit">10</span></div>
            <div>视野范围: <span id="viewBounds">0</span></div>
        </div>
    </div>

    <script>
        // CanvasEngine - Three.js画布核心引擎
        class CanvasEngine {
            constructor(container) {
                this.container = container;
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.isInitialized = false;
                this.objects = [];
                this.gridHelper = null;
            }

            init() {
                try {
                    // 创建场景
                    this.scene = new THREE.Scene();
                    this.scene.background = new THREE.Color(0x0a0a0a);

                    // 创建相机
                    this.camera = new THREE.OrthographicCamera(
                        -window.innerWidth / 2,
                        window.innerWidth / 2,
                        window.innerHeight / 2,
                        -window.innerHeight / 2,
                        0.1,
                        1000
                    );
                    this.camera.position.z = 100;

                    // 创建渲染器
                    this.renderer = new THREE.WebGLRenderer({ 
                        antialias: true,
                        alpha: true,
                        powerPreference: "high-performance"
                    });
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    this.renderer.shadowMap.enabled = true;
                    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    
                    this.container.appendChild(this.renderer.domElement);

                    // 创建网格
                    this.createGrid();

                    // 添加一些初始对象
                    this.addInitialObjects();

                    this.isInitialized = true;
                    console.log('CanvasEngine initialized successfully');
                    return true;
                } catch (error) {
                    console.error('Failed to initialize CanvasEngine:', error);
                    return false;
                }
            }

            createGrid() {
                const size = 10000;
                const divisions = 1000;
                this.gridHelper = new THREE.GridHelper(size, divisions, 0x404040, 0x202020);
                this.gridHelper.rotation.x = Math.PI / 2;
                this.scene.add(this.gridHelper);
            }

            addInitialObjects() {
                // 添加一些随机的几何体
                const geometries = [
                    new THREE.BoxGeometry(50, 50, 50),
                    new THREE.SphereGeometry(30, 32, 32),
                    new THREE.ConeGeometry(25, 60, 8),
                    new THREE.CylinderGeometry(20, 20, 50, 16)
                ];

                const materials = [
                    new THREE.MeshLambertMaterial({ color: 0xff6b6b }),
                    new THREE.MeshLambertMaterial({ color: 0x4ecdc4 }),
                    new THREE.MeshLambertMaterial({ color: 0x45b7d1 }),
                    new THREE.MeshLambertMaterial({ color: 0xf9ca24 }),
                    new THREE.MeshLambertMaterial({ color: 0xf0932b }),
                    new THREE.MeshLambertMaterial({ color: 0xeb4d4b }),
                    new THREE.MeshLambertMaterial({ color: 0x6c5ce7 })
                ];

                // 添加环境光
                const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
                this.scene.add(ambientLight);

                // 添加方向光
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(100, 100, 50);
                directionalLight.castShadow = true;
                this.scene.add(directionalLight);

                // 创建随机对象
                for (let i = 0; i < 50; i++) {
                    const geometry = geometries[Math.floor(Math.random() * geometries.length)];
                    const material = materials[Math.floor(Math.random() * materials.length)];
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    mesh.position.set(
                        (Math.random() - 0.5) * 2000,
                        (Math.random() - 0.5) * 2000,
                        0
                    );
                    
                    mesh.rotation.set(
                        Math.random() * Math.PI,
                        Math.random() * Math.PI,
                        Math.random() * Math.PI
                    );
                    
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    
                    this.scene.add(mesh);
                    this.objects.push(mesh);
                }
            }

            addRandomObjects(count = 10) {
                const geometries = [
                    new THREE.BoxGeometry(30, 30, 30),
                    new THREE.SphereGeometry(20, 16, 16),
                    new THREE.ConeGeometry(15, 40, 6)
                ];

                const materials = [
                    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff }),
                    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff }),
                    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
                ];

                for (let i = 0; i < count; i++) {
                    const geometry = geometries[Math.floor(Math.random() * geometries.length)];
                    const material = materials[Math.floor(Math.random() * materials.length)];
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    mesh.position.set(
                        (Math.random() - 0.5) * 3000,
                        (Math.random() - 0.5) * 3000,
                        0
                    );
                    
                    this.scene.add(mesh);
                    this.objects.push(mesh);
                }
            }

            render() {
                if (!this.isInitialized) return;
                
                // 旋转对象
                this.objects.forEach(obj => {
                    obj.rotation.x += 0.005;
                    obj.rotation.y += 0.005;
                });

                this.renderer.render(this.scene, this.camera);
            }

            resize() {
                if (!this.isInitialized) return;
                
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                this.camera.left = -width / 2;
                this.camera.right = width / 2;
                this.camera.top = height / 2;
                this.camera.bottom = -height / 2;
                this.camera.updateProjectionMatrix();
                
                this.renderer.setSize(width, height);
            }

            dispose() {
                if (this.renderer) {
                    this.renderer.dispose();
                }
                if (this.scene) {
                    this.scene.clear();
                }
            }

            toggleGrid() {
                if (this.gridHelper) {
                    this.gridHelper.visible = !this.gridHelper.visible;
                }
            }

            getObjectCount() {
                return this.objects.length;
            }
        }

        // CameraController - 相机控制器
        class CameraController {
            constructor(camera) {
                this.camera = camera;
                this.minZoom = 0.1;
                this.maxZoom = 10;
                this.zoomSpeed = 0.1;
                this.panSpeed = 1;
                this.bounds = {
                    minX: -5000,
                    maxX: 5000,
                    minY: -5000,
                    maxY: 5000
                };
            }

            zoom(delta) {
                const zoomFactor = 1 + delta * this.zoomSpeed;
                const newZoom = this.camera.zoom * zoomFactor;
                
                if (newZoom >= this.minZoom && newZoom <= this.maxZoom) {
                    this.camera.zoom = newZoom;
                    this.camera.updateProjectionMatrix();
                }
                
                return this.camera.zoom;
            }

            pan(deltaX, deltaY) {
                const panX = deltaX * this.panSpeed / this.camera.zoom;
                const panY = deltaY * this.panSpeed / this.camera.zoom;
                
                const newX = this.camera.position.x - panX;
                const newY = this.camera.position.y + panY;
                
                // 应用边界限制
                this.camera.position.x = Math.max(this.bounds.minX, Math.min(this.bounds.maxX, newX));
                this.camera.position.y = Math.max(this.bounds.minY, Math.min(this.bounds.maxY, newY));
            }

            setPosition(x, y, z) {
                this.camera.position.set(x, y, z || this.camera.position.z);
            }

            getBounds() {
                return this.bounds;
            }

            reset() {
                this.camera.position.set(0, 0, 100);
                this.camera.zoom = 1;
                this.camera.updateProjectionMatrix();
            }

            getZoom() {
                return this.camera.zoom;
            }

            getPosition() {
                return {
                    x: Math.round(this.camera.position.x),
                    y: Math.round(this.camera.position.y)
                };
            }
        }

        // InteractionManager - 交互事件管理
        class InteractionManager {
            constructor(container, cameraController) {
                this.container = container;
                this.cameraController = cameraController;
                this.isMouseDown = false;
                this.lastMousePos = { x: 0, y: 0 };
                this.isDragging = false;
                this.touchStartDistance = 0;
                this.lastTouchZoom = 1;
            }

            bindEvents() {
                // 鼠标事件
                this.container.addEventListener('mousedown', this.onMouseDown.bind(this));
                this.container.addEventListener('mousemove', this.onMouseMove.bind(this));
                this.container.addEventListener('mouseup', this.onMouseUp.bind(this));
                this.container.addEventListener('wheel', this.onWheel.bind(this));
                
                // 触摸事件
                this.container.addEventListener('touchstart', this.onTouchStart.bind(this));
                this.container.addEventListener('touchmove', this.onTouchMove.bind(this));
                this.container.addEventListener('touchend', this.onTouchEnd.bind(this));
                
                // 防止右键菜单
                this.container.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // 键盘事件
                document.addEventListener('keydown', this.onKeyDown.bind(this));
            }

            onMouseDown(event) {
                this.isMouseDown = true;
                this.lastMousePos = { x: event.clientX, y: event.clientY };
                this.container.classList.add('dragging');
            }

            onMouseMove(event) {
                if (!this.isMouseDown) return;
                
                const deltaX = event.clientX - this.lastMousePos.x;
                const deltaY = event.clientY - this.lastMousePos.y;
                
                this.cameraController.pan(deltaX, deltaY);
                
                this.lastMousePos = { x: event.clientX, y: event.clientY };
                this.isDragging = true;
            }

            onMouseUp(event) {
                this.isMouseDown = false;
                this.isDragging = false;
                this.container.classList.remove('dragging');
            }

            onWheel(event) {
                event.preventDefault();
                const delta = event.deltaY > 0 ? -0.1 : 0.1;
                this.cameraController.zoom(delta);
            }

            onTouchStart(event) {
                if (event.touches.length === 1) {
                    this.lastMousePos = {
                        x: event.touches[0].clientX,
                        y: event.touches[0].clientY
                    };
                } else if (event.touches.length === 2) {
                    const touch1 = event.touches[0];
                    const touch2 = event.touches[1];
                    this.touchStartDistance = Math.hypot(
                        touch2.clientX - touch1.clientX,
                        touch2.clientY - touch1.clientY
                    );
                    this.lastTouchZoom = this.cameraController.getZoom();
                }
            }

            onTouchMove(event) {
                event.preventDefault();
                
                if (event.touches.length === 1) {
                    const deltaX = event.touches[0].clientX - this.lastMousePos.x;
                    const deltaY = event.touches[0].clientY - this.lastMousePos.y;
                    
                    this.cameraController.pan(deltaX, deltaY);
                    
                    this.lastMousePos = {
                        x: event.touches[0].clientX,
                        y: event.touches[0].clientY
                    };
                } else if (event.touches.length === 2) {
                    const touch1 = event.touches[0];
                    const touch2 = event.touches[1];
                    const currentDistance = Math.hypot(
                        touch2.clientX - touch1.clientX,
                        touch2.clientY - touch1.clientY
                    );
                    
                    const scale = currentDistance / this.touchStartDistance;
                    const newZoom = this.lastTouchZoom * scale;
                    const currentZoom = this.cameraController.getZoom();
                    const delta = (newZoom - currentZoom) / currentZoom;
                    
                    this.cameraController.zoom(delta);
                }
            }

            onTouchEnd(event) {
                // 触摸结束处理
            }

            onKeyDown(event) {
                const moveSpeed = 50;
                switch (event.key) {
                    case 'ArrowUp':
                    case 'w':
                        this.cameraController.pan(0, -moveSpeed);
                        break;
                    case 'ArrowDown':
                    case 's':
                        this.cameraController.pan(0, moveSpeed);
                        break;
                    case 'ArrowLeft':
                    case 'a':
                        this.cameraController.pan(-moveSpeed, 0);
                        break;
                    case 'ArrowRight':
                    case 'd':
                        this.cameraController.pan(moveSpeed, 0);
                        break;
                    case '=':
                    case '+':
                        this.cameraController.zoom(0.1);
                        break;
                    case '-':
                        this.cameraController.zoom(-0.1);
                        break;
                    case '0':
                        this.cameraController.reset();
                        break;
                }
            }
        }

        // ViewportManager - 视口管理
        class ViewportManager {
            constructor(camera, renderer) {
                this.camera = camera;
                this.renderer = renderer;
            }

            updateSize() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                this.camera.left = -width / 2;
                this.camera.right = width / 2;
                this.camera.top = height / 2;
                this.camera.bottom = -height / 2;
                this.camera.updateProjectionMatrix();
                
                this.renderer.setSize(width, height);
            }

            screenToWorld(screenX, screenY) {
                const rect = this.renderer.domElement.getBoundingClientRect();
                const x = ((screenX - rect.left) / rect.width) * 2 - 1;
                const y = -((screenY - rect.top) / rect.height) * 2 + 1;
                
                const vector = new THREE.Vector3(x, y, 0);
                vector.unproject(this.camera);
                
                return { x: vector.x, y: vector.y };
            }

            worldToScreen(worldX, worldY) {
                const vector = new THREE.Vector3(worldX, worldY, 0);
                vector.project(this.camera);
                
                const rect = this.renderer.domElement.getBoundingClientRect();
                const x = (vector.x + 1) / 2 * rect.width + rect.left;
                const y = -(vector.y - 1) / 2 * rect.height + rect.top;
                
                return { x, y };
            }

            getViewBounds() {
                const width = window.innerWidth / this.camera.zoom;
                const height = window.innerHeight / this.camera.zoom;
                
                return {
                    left: this.camera.position.x - width / 2,
                    right: this.camera.position.x + width / 2,
                    top: this.camera.position.y + height / 2,
                    bottom: this.camera.position.y - height / 2,
                    width,
                    height
                };
            }
        }

        // PerformanceOptimizer - 性能优化
        class PerformanceOptimizer {
            constructor(scene, camera) {
                this.scene = scene;
                this.camera = camera;
                this.lastFrameTime = performance.now();
                this.frameCount = 0;
                this.fps = 0;
                this.renderTime = 0;
                this.visibleObjects = 0;
                this.frustum = new THREE.Frustum();
                this.cameraMatrix = new THREE.Matrix4();
            }

            updateLOD() {
                // LOD管理 - 根据距离调整细节级别
                const cameraPosition = this.camera.position;
                
                this.scene.traverse((object) => {
                    if (object.isMesh) {
                        const distance = cameraPosition.distanceTo(object.position);
                        
                        // 根据距离调整可见性
                        if (distance > 2000 / this.camera.zoom) {
                            object.visible = false;
                        } else {
                            object.visible = true;
                        }
                    }
                });
            }

            cullObjects() {
                // 视锥剔除
                this.cameraMatrix.multiplyMatrices(
                    this.camera.projectionMatrix,
                    this.camera.matrixWorldInverse
                );
                this.frustum.setFromProjectionMatrix(this.cameraMatrix);
                
                this.visibleObjects = 0;
                
                this.scene.traverse((object) => {
                    if (object.isMesh) {
                        if (this.frustum.intersectsObject(object)) {
                            object.visible = true;
                            this.visibleObjects++;
                        } else {
                            object.visible = false;
                        }
                    }
                });
            }

            throttleRender() {
                const currentTime = performance.now();
                const deltaTime = currentTime - this.lastFrameTime;
                
                this.frameCount++;
                
                if (deltaTime >= 1000) {
                    this.fps = Math.round((this.frameCount * 1000) / deltaTime);
                    this.frameCount = 0;
                    this.lastFrameTime = currentTime;
                }
                
                return deltaTime;
            }

            getStats() {
                return {
                    fps: this.fps,
                    renderTime: this.renderTime,
                    visibleObjects: this.visibleObjects,
                    memoryUsage: this.getMemoryUsage()
                };
            }

            getMemoryUsage() {
                if (performance.memory) {
                    return Math.round(performance.memory.usedJSHeapSize / 1024 / 1024);
                }
                return 0;
            }
        }

        // 主应用类
        class InfiniteCanvasApp {
            constructor() {
                this.canvasEngine = null;
                this.cameraController = null;
                this.interactionManager = null;
                this.viewportManager = null;
                this.performanceOptimizer = null;
                this.isRunning = false;
                this.showPerformance = false;
                
                this.uiElements = {
                    loading: document.getElementById('loading'),
                    zoomLevel: document.getElementById('zoomLevel'),
                    posX: document.getElementById('posX'),
                    posY: document.getElementById('posY'),
                    objectCount: document.getElementById('objectCount'),
                    fps: document.getElementById('fps'),
                    renderTime: document.getElementById('renderTime'),
                    visibleObjects: document.getElementById('visibleObjects'),
                    memoryUsage: document.getElementById('memoryUsage'),
                    perfStats: document.getElementById('perfStats'),
                    gridUnit: document.getElementById('gridUnit'),
                    viewBounds: document.getElementById('viewBounds')
                };
            }

            async init() {
                try {
                    const container = document.getElementById('canvasContainer');
                    
                    // 初始化核心引擎
                    this.canvasEngine = new CanvasEngine(container);
                    const initSuccess = this.canvasEngine.init();
                    
                    if (!initSuccess) {
                        throw new Error('Failed to initialize canvas engine');
                    }

                    // 初始化控制器
                    this.cameraController = new CameraController(this.canvasEngine.camera);
                    this.interactionManager = new InteractionManager(container, this.cameraController);
                    this.viewportManager = new ViewportManager(this.canvasEngine.camera, this.canvasEngine.renderer);
                    this.performanceOptimizer = new PerformanceOptimizer(this.canvasEngine.scene, this.canvasEngine.camera);

                    // 绑定事件
                    this.interactionManager.bindEvents();
                    this.bindUIEvents();
                    
                    // 窗口大小调整事件
                    window.addEventListener('resize', () => {
                        this.canvasEngine.resize();
                        this.viewportManager.updateSize();
                    });

                    // 隐藏加载界面
                    this.uiElements.loading.style.display = 'none';
                    
                    // 开始渲染循环
                    this.startRenderLoop();
                    
                    console.log('Infinite Canvas App initialized successfully');
                } catch (error) {
                    console.error('Failed to initialize app:', error);
                    this.uiElements.loading.textContent = '初始化失败: ' + error.message;
                }
            }

            bindUIEvents() {
                // 重置视图
                document.getElementById('resetView').addEventListener('click', () => {
                    this.cameraController.reset();
                });

                // 添加对象
                document.getElementById('addObjects').addEventListener('click', () => {
                    this.canvasEngine.addRandomObjects(10);
                });

                // 切换网格
                document.getElementById('toggleGrid').addEventListener('click', () => {
                    this.canvasEngine.toggleGrid();
                });

                // 切换性能监控
                document.getElementById('togglePerf').addEventListener('click', () => {
                    this.showPerformance = !this.showPerformance;
                    this.uiElements.perfStats.style.display = this.showPerformance ? 'block' : 'none';
                });
            }

            startRenderLoop() {
                this.isRunning = true;
                this.renderLoop();
            }

            renderLoop() {
                if (!this.isRunning) return;

                const startTime = performance.now();
                
                // 性能优化
                this.performanceOptimizer.updateLOD();
                this.performanceOptimizer.cullObjects();
                this.performanceOptimizer.throttleRender();
                
                // 渲染
                this.canvasEngine.render();
                
                const endTime = performance.now();
                this.performanceOptimizer.renderTime = Math.round(endTime - startTime);
                
                // 更新UI
                this.updateUI();
                
                requestAnimationFrame(() => this.renderLoop());
            }

            updateUI() {
                // 更新基础信息
                const zoom = this.cameraController.getZoom();
                const position = this.cameraController.getPosition();
                const objectCount = this.canvasEngine.getObjectCount();
                
                this.uiElements.zoomLevel.textContent = zoom.toFixed(2);
                this.uiElements.posX.textContent = position.x;
                this.uiElements.posY.textContent = position.y;
                this.uiElements.objectCount.textContent = objectCount;
                
                // 更新性能信息
                if (this.showPerformance) {
                    const stats = this.performanceOptimizer.getStats();
                    this.uiElements.fps.textContent = stats.fps;
                    this.uiElements.renderTime.textContent = stats.renderTime;
                    this.uiElements.visibleObjects.textContent = stats.visibleObjects;
                    this.uiElements.memoryUsage.textContent = stats.memoryUsage;
                }
                
                // 更新网格信息
                const viewBounds = this.viewportManager.getViewBounds();
                this.uiElements.viewBounds.textContent = `${Math.round(viewBounds.width)} x ${Math.round(viewBounds.height)}`;
            }

            stop() {
                this.isRunning = false;
                if (this.canvasEngine) {
                    this.canvasEngine.dispose();
                }
            }
        }

        // 启动应用
        document.addEventListener('DOMContentLoaded', () => {
            const app = new InfiniteCanvasApp();
            app.init();
            
            // 全局错误处理
            window.addEventListener('error', (event) => {
                console.error('Global error:', event.error);
            });
            
            // 页面卸载时清理资源
            window.addEventListener('beforeunload', () => {
                app.stop();
            });
        });
    </script>
</body>
</html>
